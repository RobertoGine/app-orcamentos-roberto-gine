name: orcamento_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # banco de dados
  sqflite: ^2.3.2
  path: ^1.9.0

  # arquivos e armazenamento
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # PDF e impressão
  pdf: ^3.10.8
  printing: ^5.12.0

  # compartilhamento
  share_plus: ^7.2.1

  # utilidades
  intl: ^0.20.2
  url_launcher: ^6.1.10

  # imagens
  image_picker: ^1.0.7

  # gráficos
  fl_chart: ^0.66.0

  # ícone do app
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/pinguim.png
    - assets/logo_app.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png